version: '3'
services:
  nagios:
    image: jasonrivers/nagios:latest
    ports:
      - '8080:80'
    volumes:
      - ./nagios-config:/opt/nagios/etc
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped